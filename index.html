<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- PWA 和移动端视口配置 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>小说生成器</title>

    <!-- PWA 核心配置 -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#F2F2F7">
    
    <!-- iOS PWA 专属全屏与图标配置 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="小说生成">
    <link rel="apple-touch-icon" href="https://pic1.imgdb.cn/item/6a322e1e81fd5b0737952d0b.png">

    <style>
        :root {
            --bg-color: #F2F2F7;
            --text-main: #1D1D1F;
            --text-sub: #86868B;
            --theme-blue: #007AFF;
            --nav-bg: rgba(255, 255, 255, 0.95);
            --red-badge: #FF3B30;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            /* 禁用长按选中文本，让它更像原生 App */
            user-select: none; 
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background-color: #e5e5e5;
            display: flex;
            justify-content: center;
            height: 100vh;
        }

        /* 模拟屏幕容器，如果被安装为桌面App，它会自动铺满屏幕 */
        .app-container {
            width: 100%;
            max-width: 414px;
            height: 100%;
            background-color: var(--bg-color);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        /* 顶部导航栏，预留刘海屏(safe-area)的距离 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: calc(24px + env(safe-area-inset-top)) 20px 10px;
        }

        .header-left {
            display: flex;
            align-items: baseline;
            gap: 12px;
        }

        .header-title {
            font-size: 28px;
            font-weight: 700;
            color: #2b67d8;
            letter-spacing: 1px;
        }

        .header-count {
            font-size: 14px;
            color: var(--text-sub);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
            color: var(--text-sub);
            font-size: 14px;
        }

        .header-icon {
            width: 20px;
            height: 20px;
            fill: currentColor;
            cursor: pointer;
        }

        .dropdown {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }

        /* 主体内容区 */
        .content {
            flex: 1;
            padding: 15px 20px;
            overflow-y: auto;
            scrollbar-width: none; 
            padding-bottom: 100px;
            position: relative; /* 为空状态绝对定位做准备 */
        }
        .content::-webkit-scrollbar { display: none; }

        /* 书架空空如也 状态提示 */
        .empty-state {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--text-sub);
            font-size: 15px;
            letter-spacing: 1px;
            text-align: center;
            width: 100%;
        }

        .book-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px 15px;
        }

        .book-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s;
            animation: fadeIn 0.4s ease;
        }
        .book-item:active { transform: scale(0.95); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .book-cover-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 3 / 4.2;
            border-radius: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            overflow: hidden;
            background-color: #fff;
        }

        .book-cover {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .badge-new {
            position: absolute;
            top: 0;
            right: 0;
            background-color: var(--red-badge);
            color: white;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 6px;
            border-bottom-left-radius: 6px;
        }

        .book-info {
            margin-top: 10px;
            text-align: center;
            width: 100%;
        }

        .book-title {
            font-size: 12px;
            color: var(--text-main);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .book-progress {
            font-size: 11px;
            color: var(--text-sub);
            margin-top: 4px;
        }

        /* 底部悬浮导航栏 */
        .bottom-nav-wrap {
            position: absolute;
            bottom: calc(25px + env(safe-area-inset-bottom));
            left: 20px;
            right: 20px;
            background: var(--nav-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 40px;
            display: flex;
            justify-content: space-between;
            padding: 8px 10px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.06);
            z-index: 10;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 8px 0;
            border-radius: 30px;
            color: var(--text-sub);
            text-decoration: none;
            font-size: 11px;
            transition: all 0.3s ease;
        }

        .nav-item svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .nav-item.active {
            background-color: #EBF4FF;
            color: var(--theme-blue);
        }

        .generate-btn {
            position: absolute;
            bottom: calc(100px + env(safe-area-inset-bottom));
            right: 20px;
            background: var(--theme-blue);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.4);
            cursor: pointer;
            z-index: 9;
        }
        .generate-btn:active { background: #005ecb; }
    </style>
</head>
<body>

<div class="app-container">
    
    <header class="header">
        <div class="header-left">
            <h1 class="header-title">书架</h1>
            <!-- 初始为 0 本 -->
            <span class="header-count" id="book-count">0本</span>
        </div>
        <div class="header-right">
            <div class="dropdown">
                全部
                <svg viewBox="0 0 24 24" class="header-icon" style="width:14px;height:14px;"><path d="M7 10l5 5 5-5z"/></svg>
            </div>
            <svg viewBox="0 0 24 24" class="header-icon"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <svg viewBox="0 0 24 24" class="header-icon"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
        </div>
    </header>

    <div class="content">
        <!-- 初始空状态文字 -->
        <div id="empty-state" class="empty-state">当前书架空空如也</div>
        
        <div class="book-grid" id="book-grid">
            <!-- 书籍将被动态插入到这里 -->
        </div>
    </div>

    <!-- 演示用生成按钮 -->
    <button class="generate-btn" onclick="generateNovel()">+ 模拟AI生成</button>

    <div class="bottom-nav-wrap">
        <a href="#" class="nav-item active" onclick="switchTab(this)">
            <svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-3 9H9V9h8v2zm0-4H9V5h8v2z"/></svg>
            书架
        </a>
        <a href="#" class="nav-item" onclick="switchTab(this)">
            <svg viewBox="0 0 24 24"><path d="M4 4h16v2H4zm0 4h16v2H4zm0 4h16v2H4zm0 4h16v2H4z"/></svg>
            书库
        </a>
        <a href="#" class="nav-item" onclick="switchTab(this)">
            <svg viewBox="0 0 24 24"><path d="M10 20h4V4h-4v16zm-6 0h4v-8H4v8zM16 9v11h4V9h-4z"/></svg>
            统计
        </a>
        <a href="#" class="nav-item" onclick="switchTab(this)">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            我的
        </a>
    </div>

</div>

<script>
    // --- PWA Service Worker 注册逻辑 ---
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').then(reg => {
                console.log('SW 注册成功', reg.scope);
            }).catch(err => {
                console.log('SW 注册失败', err);
            });
        });
    }

    // --- 页面 UI 逻辑 ---
    function switchTab(element) {
        document.querySelectorAll('.nav-item').forEach(item => {
            item.classList.remove('active');
        });
        element.classList.add('active');
    }

    let bookCount = 0;
    const covers = [
        "https://images.unsplash.com/photo-1505664194779-8beaceb93744?ixlib=rb-4.0.3&auto=format&fit=crop&w=300&q=80",
        "https://images.unsplash.com/photo-1519681393784-d120267933ba?ixlib=rb-4.0.3&auto=format&fit=crop&w=300&q=80",
        "https://images.unsplash.com/photo-1478760329108-5c3ed9d495a0?ixlib=rb-4.0.3&auto=format&fit=crop&w=300&q=80"
    ];
    const titles = ["《星际穿越指南》", "《赛博朋克：边缘法则》", "《深海的回音》"];

    function generateNovel() {
        // 1. 如果有“空空如也”的提示，就把它移除
        const emptyState = document.getElementById('empty-state');
        if (emptyState) {
            emptyState.remove();
        }

        // 2. 生成一本书
        const randomCover = covers[Math.floor(Math.random() * covers.length)];
        const randomTitle = titles[Math.floor(Math.random() * titles.length)];
        
        const newBook = document.createElement('div');
        newBook.className = 'book-item';
        newBook.innerHTML = `
            <div class="book-cover-wrap">
                <span class="badge-new">New</span>
                <img src="${randomCover}" alt="封面" class="book-cover">
            </div>
            <div class="book-info">
                <div class="book-title">${randomTitle} 作者：AI模型【完</div>
                <div class="book-progress">0.0%</div>
            </div>
        `;

        const grid = document.getElementById('book-grid');
        grid.insertBefore(newBook, grid.firstChild);

        // 3. 更新顶部书架数字
        bookCount++;
        document.getElementById('book-count').innerText = bookCount + '本';
    }
</script>

</body>
</html>
